name: PyMOLViewer
options:
  bundleIdPrefix: io.raymol
  deploymentTarget:
    macOS: "13.0"
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

configFiles:
  Debug: PyMOLBridge.xcconfig
  Release: PyMOLBridge.xcconfig

# Sparkle auto-update framework. macOS-only — linked into the macOS slice of the
# shared PyMOLViewer target via a platformFilter dependency; never the iOS slice.
# RAYMOL_SPARKLE_BEGIN — stripped for the Mac App Store build by archive_appstore.sh
# (MAS forbids self-update + Sparkle's helpers fail sandbox validation, error 90296).
# The Developer-ID/DMG build keeps Sparkle for auto-update.
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0
# RAYMOL_SPARKLE_END

settings:
  base:
    SWIFT_VERSION: "5.9"
    CLANG_CXX_LANGUAGE_STANDARD: c++17
    CLANG_ENABLE_MODULES: YES
    SWIFT_OBJC_BRIDGING_HEADER: PyMOLViewer/Bridge/PyMOLBridge.h
    # Do NOT add PyMOL layer paths to HEADER_SEARCH_PATHS —
    # layer0/Block.h shadows the system Block.h and breaks module builds.
    # All paths/flags (incl. per-SDK LIBRARY_SEARCH_PATHS) live in
    # PyMOLBridge.xcconfig. macOS links build_macos_swiftui + the embedded
    # standalone Python 3.13 (no Homebrew/python@3.14). Do NOT set
    # LIBRARY_SEARCH_PATHS here — a target-level value would override the
    # xcconfig's per-SDK paths.

targets:
  PyMOLViewer:
    type: application
    platform: [macOS, iOS]
    sources:
      - path: PyMOLViewer
        excludes:
          - "**/*.md"
    settings:
      base:
        # Apple-silicon only: the embedded standalone Python 3.13, libpymol_core.a,
        # and Homebrew deps are all arm64-only, so Release/Archive (which would
        # otherwise build "Any Mac" incl. x86_64) must be pinned to arm64 or the
        # link fails with undefined symbols. iOS device/sim on Apple Silicon are
        # arm64 too. (Debug worked only because it builds the active arch.)
        ARCHS: arm64
        ONLY_ACTIVE_ARCH: "NO"
        PRODUCT_NAME: RayMol
        PRODUCT_BUNDLE_IDENTIFIER: io.raymol.RayMol
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.5.0"
        CURRENT_PROJECT_VERSION: 14
        GENERATE_INFOPLIST_FILE: YES
        # Generate a launch screen so iOS renders at the device's NATIVE
        # resolution. Without it the app is letterboxed at a legacy size on
        # physical devices (the Simulator is more lenient).
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        # User-facing app brand. PRODUCT_NAME = RayMol → the bundle is RayMol.app
        # and CFBundleName derives from it. CFBundleDisplayName (iOS home-screen
        # name) is set here; the post-build step below still force-sets
        # CFBundleName = RayMol since the generated plist can lag PRODUCT_NAME.
        INFOPLIST_KEY_CFBundleDisplayName: RayMol
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.education
        # Export compliance: only standard HTTPS/TLS → exempt, no extra paperwork.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        # iOS orientations: portrait + both landscapes, no upside-down (a
        # molecular viewer flipped 180° is disorienting and serves no purpose).
        # Applied to iPhone and iPad; ignored on the macOS slice of this target.
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
          # App Store distribution: automatic Distribution signing + App Sandbox
          # + Hardened Runtime + entitlements (created in Task 2). Both platforms.
          DEVELOPMENT_TEAM: VT99UQUQ89
          CODE_SIGN_STYLE: Automatic
          ENABLE_HARDENED_RUNTIME: YES
          ENABLE_APP_SANDBOX: YES
          CODE_SIGN_ENTITLEMENTS: PyMOLViewer/RayMol.entitlements
          # iOS App Store guideline-2.5.2 fallback: if the iOS app is rejected
          # for the command line / Raymond, uncomment the next line to compile
          # them out of the iOS build (no effect on macOS — the flag is gated to
          # os(iOS) in RayMolBuild), then re-archive + resubmit GUI-only.
          # SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) RAYMOL_IOS_APPSTORE_RESTRICTED
          # Mac App Store fallback: uncomment to compile the MCP server + bridge
          # OUT of the macOS build (sandbox + 2.5.2). No effect on iOS — gated to
          # os(macOS) in RayMolBuild.mcpEnabled. Then archive for the MAS.
          # SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) RAYMOL_MAS_RESTRICTED
    # iOS runtime packaging (BeeWare CPython 3.13). Guarded to iOS via
    # PLATFORM_NAME so the macOS target is unaffected. The xcframework has no
    # macOS slice, so a native embed dependency can't be used on a shared target.
    postBuildScripts:
      # User-facing app brand: force CFBundleName = RayMol. PRODUCT_NAME is now
      # RayMol so the bundle is RayMol.app, but the generated Info.plist can lag
      # PRODUCT_NAME for CFBundleName (no INFOPLIST_KEY_* for it), so set it
      # directly on the built plist. Runs on BOTH platforms (macOS title bar /
      # app menu + iOS).
      - name: "Brand: set CFBundleName = RayMol"
        basedOnDependencyAnalysis: false
        # Declare the generated Info.plist as an input so Xcode's build graph
        # schedules this script AFTER Info.plist processing. Without this edge the
        # script races plist generation and its plutil edits can be silently
        # overwritten (this is what dropped the Sparkle keys from a 1.3.2 build).
        inputFiles:
          - "$(TARGET_BUILD_DIR)/$(INFOPLIST_PATH)"
        script: |
          set -e
          PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          [ -f "$PLIST" ] || { echo "no Info.plist at $PLIST"; exit 0; }
          /usr/bin/plutil -replace CFBundleName -string "RayMol" "$PLIST"
          echo "CFBundleName -> RayMol ($PLIST)"
      # Sparkle auto-update keys. macOS only (Sparkle is not linked on iOS), and
      # skipped for the Mac App Store fallback (RAYMOL_MAS_RESTRICTED) since that
      # build updates through Apple. The public EdDSA key pairs with the private
      # key in the developer's login keychain (used by swiftui/publish_release.sh).
      - name: "Sparkle: inject auto-update Info.plist keys (macOS, non-MAS)"
        basedOnDependencyAnalysis: false
        # Input dependency on the generated Info.plist forces this to run AFTER
        # plist processing (see note above). make_dmg.sh ALSO re-asserts these
        # keys before signing as a release-time guarantee; this fixes dev builds.
        inputFiles:
          - "$(TARGET_BUILD_DIR)/$(INFOPLIST_PATH)"
        script: |
          set -e
          case "${PLATFORM_NAME:-}" in macosx) ;; *) echo "Sparkle keys skipped ($PLATFORM_NAME)"; exit 0 ;; esac
          case "${SWIFT_ACTIVE_COMPILATION_CONDITIONS:-}" in *RAYMOL_MAS_RESTRICTED*) echo "Sparkle keys skipped (MAS build)"; exit 0 ;; esac
          PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          [ -f "$PLIST" ] || { echo "no Info.plist at $PLIST"; exit 0; }
          /usr/bin/plutil -replace SUFeedURL -string "https://github.com/javierbq/RayMol/releases/latest/download/appcast.xml" "$PLIST"
          /usr/bin/plutil -replace SUPublicEDKey -string "V+5+HSmGNq4JQXW6tDbODBtV3z0Sn/nk/qFyycc2Blg=" "$PLIST"
          /usr/bin/plutil -replace SUEnableAutomaticChecks -bool true "$PLIST"
          /usr/bin/plutil -replace SUScheduledCheckInterval -integer 86400 "$PLIST"
          echo "Sparkle keys -> $PLIST"
      # Register RayMol as a handler/default for molecular file formats. The
      # generated Info.plist (GENERATE_INFOPLIST_FILE=YES) has no INFOPLIST_KEY_*
      # for the complex CFBundleDocumentTypes / UTImportedTypeDeclarations arrays,
      # so inject them directly on the built plist (both macOS + iOS). RayMol owns
      # .pse (LSHandlerRank=Owner); the structure/small-molecule/map families are
      # declared as imported UTIs (conforming to public.data, plus public.text for
      # the text-based ones) so RayMol becomes a first-class handler and the
      # default where nothing else claims the type. macOS registration happens via
      # lsregister; iOS surfaces these in Files / Open-in.
      - name: "Brand: register molecular document types"
        basedOnDependencyAnalysis: false
        # Input dependency on the generated Info.plist forces this to run AFTER
        # plist processing (see note above) — same race that dropped these arrays.
        inputFiles:
          - "$(TARGET_BUILD_DIR)/$(INFOPLIST_PATH)"
        script: |
          set -e
          PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          [ -f "$PLIST" ] || { echo "no Info.plist at $PLIST"; exit 0; }
          /usr/bin/plutil -replace CFBundleDocumentTypes -json '[
            {"CFBundleTypeName":"PyMOL Session","CFBundleTypeRole":"Editor","LSHandlerRank":"Owner","LSItemContentTypes":["org.pymol.pse"]},
            {"CFBundleTypeName":"Molecular Structure","CFBundleTypeRole":"Viewer","LSHandlerRank":"Default","LSItemContentTypes":["org.pymol.structure"]},
            {"CFBundleTypeName":"Small Molecule","CFBundleTypeRole":"Viewer","LSHandlerRank":"Default","LSItemContentTypes":["org.pymol.small-molecule"]},
            {"CFBundleTypeName":"Electron Density / Map","CFBundleTypeRole":"Viewer","LSHandlerRank":"Default","LSItemContentTypes":["org.pymol.map"]}
          ]' "$PLIST"
          /usr/bin/plutil -replace UTImportedTypeDeclarations -json '[
            {"UTTypeIdentifier":"org.pymol.pse","UTTypeDescription":"PyMOL Session","UTTypeConformsTo":["public.data"],"UTTypeTagSpecification":{"public.filename-extension":["pse"]}},
            {"UTTypeIdentifier":"org.pymol.structure","UTTypeDescription":"Molecular Structure","UTTypeConformsTo":["public.data","public.text"],"UTTypeTagSpecification":{"public.filename-extension":["pdb","ent","cif","mmcif","mcif","mmtf"]}},
            {"UTTypeIdentifier":"org.pymol.small-molecule","UTTypeDescription":"Small Molecule","UTTypeConformsTo":["public.data","public.text"],"UTTypeTagSpecification":{"public.filename-extension":["sdf","mol","mol2","xyz","mae"]}},
            {"UTTypeIdentifier":"org.pymol.map","UTTypeDescription":"Electron Density / Map","UTTypeConformsTo":["public.data"],"UTTypeTagSpecification":{"public.filename-extension":["ccp4","mtz","dx","xplor","map","mrc"]}}
          ]' "$PLIST"
          echo "CFBundleDocumentTypes + UTImportedTypeDeclarations -> $PLIST"
      - name: "iOS: Embed Python.framework"
        basedOnDependencyAnalysis: false
        script: |
          case "$PLATFORM_NAME" in iphone*) ;; *) echo "skip (non-iOS)"; exit 0 ;; esac
          set -e
          if [ "$EFFECTIVE_PLATFORM_NAME" = "-iphonesimulator" ]; then SLICE=ios-arm64_x86_64-simulator; else SLICE=ios-arm64; fi
          SRC="$SRCROOT/../deps_ios/Python.xcframework/$SLICE/Python.framework"
          mkdir -p "$CODESIGNING_FOLDER_PATH/Frameworks"
          ditto "$SRC" "$CODESIGNING_FOLDER_PATH/Frameworks/Python.framework"
      - name: "iOS: Install Python stdlib"
        basedOnDependencyAnalysis: false
        script: |
          case "$PLATFORM_NAME" in iphone*) ;; *) exit 0 ;; esac
          set -e
          if [ "$EFFECTIVE_PLATFORM_NAME" = "-iphonesimulator" ]; then SLICE=ios-arm64_x86_64-simulator; else SLICE=ios-arm64; fi
          mkdir -p "$CODESIGNING_FOLDER_PATH/python/lib"
          rsync -au --delete "$SRCROOT/../deps_ios/Python.xcframework/$SLICE/lib/" "$CODESIGNING_FOLDER_PATH/python/lib/"
          # App Review compliance (mirrors the macOS prune; mostly defensive on iOS
          # since BeeWare ships no Tk binaries and its stdlib already omits the
          # itms-services token):
          #  (2.5.1) Drop any Tcl/Tk binaries + the dead pure-Python tkinter package
          #  so the bundle carries zero Tk references. The native Metal/SwiftUI app
          #  never launches the legacy pmg_tk Tkinter GUI.
          PYLIB="$CODESIGNING_FOLDER_PATH/python/lib"
          rm -rf "$PYLIB"/libtcl*.dylib "$PYLIB"/libtk*.dylib \
                 "$PYLIB"/tcl* "$PYLIB"/tk* "$PYLIB"/itcl* "$PYLIB"/thread* \
                 "$PYLIB"/python*/tkinter
          rm -f  "$PYLIB"/python*/lib-dynload/_tkinter*.so
          #  (2.5.2) Strip 'itms-services' from urllib/parse.py's uses_netloc. No-op
          #  on the current BeeWare build, but guarantees parity if a future stdlib
          #  bump reintroduces the literal Apple's static scanner flags.
          /usr/bin/sed -i '' "s/, 'itms-services'//g" "$PYLIB"/python*/urllib/parse.py
      - name: "iOS: Prepare Python binary modules"
        basedOnDependencyAnalysis: false
        script: |
          case "$PLATFORM_NAME" in iphone*) ;; *) exit 0 ;; esac
          set -e
          TEMPLATE="$SRCROOT/PyMOLViewer/Resources/dylib-Info-template.plist"
          install_dylib () {
            INSTALL_BASE=$1; FULL_EXT=$2
            RELATIVE_EXT=${FULL_EXT#$CODESIGNING_FOLDER_PATH/}
            PYTHON_EXT=${RELATIVE_EXT/$INSTALL_BASE/}
            FULL_MODULE_NAME=$(echo $PYTHON_EXT | cut -d "." -f 1 | tr "/" ".")
            FRAMEWORK_BUNDLE_ID=$(echo $PRODUCT_BUNDLE_IDENTIFIER.$FULL_MODULE_NAME | tr "_" "-")
            FRAMEWORK_FOLDER="Frameworks/$FULL_MODULE_NAME.framework"
            if [ ! -d "$CODESIGNING_FOLDER_PATH/$FRAMEWORK_FOLDER" ]; then
              mkdir -p "$CODESIGNING_FOLDER_PATH/$FRAMEWORK_FOLDER"
              cp "$TEMPLATE" "$CODESIGNING_FOLDER_PATH/$FRAMEWORK_FOLDER/Info.plist"
              plutil -replace CFBundleExecutable -string "$FULL_MODULE_NAME" "$CODESIGNING_FOLDER_PATH/$FRAMEWORK_FOLDER/Info.plist"
              plutil -replace CFBundleIdentifier -string "$FRAMEWORK_BUNDLE_ID" "$CODESIGNING_FOLDER_PATH/$FRAMEWORK_FOLDER/Info.plist"
            fi
            mv "$FULL_EXT" "$CODESIGNING_FOLDER_PATH/$FRAMEWORK_FOLDER/$FULL_MODULE_NAME"
            echo "$FRAMEWORK_FOLDER/$FULL_MODULE_NAME" > "${FULL_EXT%.so}.fwork"
            echo "${RELATIVE_EXT%.so}.fwork" > "$CODESIGNING_FOLDER_PATH/$FRAMEWORK_FOLDER/$FULL_MODULE_NAME.origin"
          }
          PYTHON_VER=$(ls -1 "$CODESIGNING_FOLDER_PATH/python/lib")

          # Cross-compiled numpy (best-effort): copy the SDK-correct slice into
          # site-packages, then framework-wrap each numpy .so exactly like the
          # stdlib lib-dynload modules above (iOS forbids dlopen of loose .so in
          # the bundle; the .fwork redirect points the import at the framework).
          # numpy ships no iOS wheels — these slices are built by
          # scripts/build_numpy_ios.sh (meson cross-compile, no external BLAS).
          # Guarded: if the slice is absent the app still builds + runs WITHOUT
          # numpy (Task 1 / on-device Vertex minting does not depend on it).
          if [ "$EFFECTIVE_PLATFORM_NAME" = "-iphonesimulator" ]; then NP_SLICE=simulator; else NP_SLICE=device; fi
          NP_SRC="$SRCROOT/../deps_ios/numpy-ios/$NP_SLICE/numpy"
          if [ -d "$NP_SRC" ]; then
            SP="$CODESIGNING_FOLDER_PATH/python/lib/$PYTHON_VER/site-packages"
            mkdir -p "$SP"
            rsync -a --delete "$NP_SRC/" "$SP/numpy/"
            find "$SP/numpy" -name "*.so" | while read FULL_EXT; do
              install_dylib "python/lib/$PYTHON_VER/site-packages/" "$FULL_EXT"
            done
            echo "numpy ($NP_SLICE) bundled + framework-wrapped"
          else
            echo "numpy slice $NP_SLICE not found ($NP_SRC) — app builds without numpy"
          fi

          find "$CODESIGNING_FOLDER_PATH/python/lib/$PYTHON_VER/lib-dynload" -name "*.so" | while read FULL_EXT; do
            install_dylib "python/lib/$PYTHON_VER/lib-dynload/" "$FULL_EXT"
          done
          if [ -n "$EXPANDED_CODE_SIGN_IDENTITY" ]; then
            find "$CODESIGNING_FOLDER_PATH/Frameworks" -name "*.framework" -exec /usr/bin/codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" ${OTHER_CODE_SIGN_FLAGS:-} -o runtime --timestamp=none --preserve-metadata=identifier,entitlements,flags "{}" \; || true
          fi
      - name: "iOS: Bundle PyMOL modules + data"
        basedOnDependencyAnalysis: false
        script: |
          case "$PLATFORM_NAME" in iphone*) ;; *) exit 0 ;; esac
          set -e
          ditto "$SRCROOT/../modules" "$CODESIGNING_FOLDER_PATH/modules"
          ditto "$SRCROOT/../data" "$CODESIGNING_FOLDER_PATH/data"
      # macOS runtime packaging: payload under Contents/Resources (so the shared
      # bridge's config.home=<resourcePath>/python resolves to it). Guarded to
      # macOS so the iOS build is unaffected.
      - name: "macOS: Bundle Python + modules + data"
        basedOnDependencyAnalysis: false
        script: |
          case "$PLATFORM_NAME" in macosx*) ;; *) exit 0 ;; esac
          set -e
          RES="$CODESIGNING_FOLDER_PATH/Contents/Resources"
          mkdir -p "$RES"
          rsync -au --delete "$SRCROOT/../deps_macos/python-standalone/python/" "$RES/python/"
          # App Review compliance — prune from the embedded Python before signing:
          #  (2.5.1) The bundled Tcl/Tk's libtcl9tk9.0.dylib references the private
          #  AppKit symbol _NSWindowDidOrderOnScreenNotification. The native
          #  Metal/SwiftUI app never launches the legacy pmg_tk Tkinter GUI, so the
          #  whole Tcl/Tk stack is dead weight. Remove it.
          PYLIB="$RES/python/lib"
          rm -rf "$PYLIB"/libtcl*.dylib "$PYLIB"/libtk*.dylib \
                 "$PYLIB"/tcl* "$PYLIB"/tk* "$PYLIB"/itcl* "$PYLIB"/thread* \
                 "$PYLIB"/python*/tkinter
          rm -f  "$PYLIB"/python*/lib-dynload/_tkinter*.so
          #  (2.5.2) CPython's stdlib urllib/parse.py lists 'itms-services' in
          #  uses_netloc; Apple's static scanner reads that literal as the app
          #  installing executable code via itms-services://. RayMol never uses the
          #  scheme — strip the token (no functional effect on URL parsing we do).
          /usr/bin/sed -i '' "s/, 'itms-services'//g" "$PYLIB"/python*/urllib/parse.py
          ditto "$SRCROOT/../modules" "$RES/modules"
          # Mac App Store build: drop the MCP server package (compiled out of the app).
          case "${SWIFT_ACTIVE_COMPILATION_CONDITIONS:-}" in *RAYMOL_MAS_RESTRICTED*) rm -rf "$RES/modules/raymol_mcp" ;; esac
          ditto "$SRCROOT/../data" "$RES/data"
          # Mac App Store code-signing of the embedded Python. python-standalone
          # ships its own signatures (foreign team, no app-sandbox), and Xcode's
          # final signing doesn't re-sign files under Resources/. So re-sign every
          # embedded Mach-O with OUR identity + hardened runtime here (before the
          # bundle is sealed): nested EXECUTABLES (bin/) get the app-sandbox +
          # inherit entitlement (Apple requires every nested executable to carry
          # app-sandbox — error 90296); libraries (.dylib/.so) get our signature
          # without entitlements. Runs only when signing (skipped for unsigned CLI).
          if [ -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" ]; then
            ENT="$SRCROOT/PyMOLViewer/RayMolPython.entitlements"
            # Executables under the embedded python's bin/.
            find "$RES/python/bin" -type f 2>/dev/null | while read -r f; do
              /usr/bin/file "$f" | /usr/bin/grep -q "Mach-O.*executable" && \
                /usr/bin/codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" \
                  -o runtime --timestamp=none --entitlements "$ENT" "$f" || true
            done
            # All embedded libraries / extension modules.
            find "$RES/python" \( -name "*.dylib" -o -name "*.so" \) -type f | while read -r f; do
              /usr/bin/codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" \
                -o runtime --timestamp=none "$f" || true
            done
          fi
      - name: "macOS: Build + bundle pymol.metallib"
        basedOnDependencyAnalysis: false
        script: |
          case "$PLATFORM_NAME" in macosx*) ;; *) exit 0 ;; esac
          set -e
          RES="$CODESIGNING_FOLDER_PATH/Contents/Resources"
          /usr/bin/python3 "$SRCROOT/../scripts/compile_metal_shaders.py" --sdk macosx --output "/tmp/pymol_macos.metallib" || true
          [ -f /tmp/pymol_macos.metallib ] && cp /tmp/pymol_macos.metallib "$RES/pymol.metallib" || echo "metallib skipped (runtime-compile fallback)"
      # macOS portability: freetype/libpng are linked out of Homebrew (-lfreetype
      # -lpng16 from /opt/homebrew/lib in PyMOLBridge.xcconfig), so the linker
      # bakes /opt/homebrew/.../libfreetype.6.dylib into the binary as a hard load
      # command. On any Mac without those exact Homebrew kegs (every end user, a
      # clean VM, the App Store sandbox) dyld can't find them and aborts at launch
      # ("Library not loaded ... Namespace DYLD ... Library missing"). This step
      # copies those dylibs into Contents/Frameworks and rewrites the load
      # commands + ids to @rpath, adding @executable_path/../Frameworks to the
      # binary's runpath, so the app is self-contained. Idempotent: a second run
      # finds nothing to rewrite. The script signs only the copied dylibs (when
      # signing); the main binary is sealed by Xcode's final CodeSign / make_dmg.
      - name: "macOS: Bundle Homebrew dylibs into Frameworks (@rpath)"
        basedOnDependencyAnalysis: false
        script: |
          case "$PLATFORM_NAME" in macosx*) ;; *) exit 0 ;; esac
          set -e
          if [ -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" ]; then
            /usr/bin/python3 "$SRCROOT/../scripts/bundle_macos_dylibs.py" \
              "$CODESIGNING_FOLDER_PATH" \
              --sign-identity "$EXPANDED_CODE_SIGN_IDENTITY" --hardened
          else
            /usr/bin/python3 "$SRCROOT/../scripts/bundle_macos_dylibs.py" \
              "$CODESIGNING_FOLDER_PATH"
          fi
# RAYMOL_SPARKLE_BEGIN — stripped for the Mac App Store build (see archive_appstore.sh)
    dependencies:
      # macOS-only: Sparkle has no iOS slice, so the platforms filter keeps it
      # out of the iOS build. All Swift usage is additionally guarded by
      # #if os(macOS) && !RAYMOL_MAS_RESTRICTED.
      - package: Sparkle
        platforms: [macOS]
# RAYMOL_SPARKLE_END
    scheme:
      testTargets:
        - PyMOLViewerUITests
      gatherCoverageData: false

  # iOS UI-test target: real-touch gesture coverage (rotate/zoom/Z-roll/tap)
  # through the genuine UIKit recognizer path, verified by pixel-diffing the
  # Metal-rendered viewport. iOS-only; does not affect the macOS app.
  PyMOLViewerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - PyMOLViewerUITests
    dependencies:
      - target: PyMOLViewer_iOS
        link: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.raymol.RayMol.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: PyMOLViewer_iOS
        TARGETED_DEVICE_FAMILY: "1,2"
        # The project xcconfig + base settings link pymol_core + Python and set
        # a C++ bridging header for the APP. A pure-Swift UI-test bundle must
        # inherit NONE of that (else it dlopens @rpath/Python.framework and
        # fails to load). Blank them out at the target level (highest priority).
        SWIFT_OBJC_BRIDGING_HEADER: ""
        OTHER_LDFLAGS: ""
        OTHER_CPLUSPLUSFLAGS: ""
