name: Headless unit tests

# Fast, build-free checks that run on every push and PR. These test the
# fork-specific Python layer (RayMol appkit_* panels, metal_pick math) in
# isolation by stubbing AppKit/objc/Foundation and the pymol package, so they
# need neither a C++ build nor a GPU and finish in seconds — quick signal ahead
# of the full build matrix in build.yml (which also runs these via
# `testing.py --run all`).

on: [push, pull_request]

jobs:
  headless-python:
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run headless unit tests
        run: |
          python -m unittest -v \
            testing.tests.test_appkit_measure \
            testing.tests.test_appkit_sequence \
            testing.tests.test_appkit_object_panel \
            testing.tests.test_appkit_settings \
            testing.tests.test_appkit_theme_preview \
            testing.tests.test_appkit_command_panel \
            testing.tests.test_appkit_menus \
            testing.tests.test_appkit_sequence_panel \
            testing.tests.test_appkit_ray_overlay \
            testing.tests.test_mouse_panel \
            testing.tests.test_metal_pick
