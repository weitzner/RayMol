name: RayMol unit tests (embedded)

# Build the fork's pymol on macOS and run the RayMol-specific test files under
# the REAL embedded interpreter (pymol -ckqy testing/testing.py --run ...), so
# the fork's Python layer (appkit_* panels, metal_pick) is exercised faithfully
# with the actual _cmd core + pytest routing rather than a plain-python stub.
#
# Scoped to the fork's own test files on purpose: it stays green independently of
# the full upstream `--run all` suite (which has unrelated pre-existing failures).
#
# The build recipe mirrors the macOS job in build.yml (conda + x86_64 miniforge
# on macos-13), whose Build step is known to succeed.

on: [push, pull_request]

jobs:
  macos-embedded:
    runs-on: macos-13

    env:
      CONDA_ROOT: "/tmp/miniforge"
      CONDA_ENV_NAME: "testing_env"

    steps:
      - uses: actions/checkout@v4

      - name: Download Miniforge
        run: |
          curl -L -o $CONDA_ROOT.sh https://github.com/conda-forge/miniforge/releases/download/24.11.0-0/Miniforge3-MacOSX-x86_64.sh
          bash $CONDA_ROOT.sh -b -p $CONDA_ROOT

      - name: Add conda to PATH
        run: |
          echo "${CONDA_ROOT}/bin" >> "$GITHUB_PATH"

      - name: Set up Miniforge
        run: |
          conda create --name $CONDA_ENV_NAME -c conda-forge -c schrodinger --override-channels \
              python=3.12 \
              pip \
              catch2=2.13.3 \
              collada2gltf \
              freetype \
              glew \
              glm \
              libpng \
              libxml2-devel \
              libnetcdf

      - name: Get additional sources
        run: |
          source activate $CONDA_ENV_NAME
          git clone --depth 1 https://github.com/rcsb/mmtf-cpp.git
          cp -R mmtf-cpp/include/* ${CONDA_PREFIX}/include/
          git clone --depth 1 --single-branch --branch cpp_master https://github.com/msgpack/msgpack-c.git
          cp -R msgpack-c/include/* ${CONDA_PREFIX}/include/

      - name: Build PyMOL
        run: |
          source activate $CONDA_ENV_NAME
          export MACOSX_DEPLOYMENT_TARGET=12.0
          pip install -v --config-settings testing=True '.[dev]'

      - name: Run RayMol unit tests under embedded pymol
        run: |
          source activate $CONDA_ENV_NAME
          pymol -ckqy testing/testing.py --run \
              testing/tests/test_appkit_measure.py \
              testing/tests/test_appkit_sequence.py \
              testing/tests/test_appkit_object_panel.py \
              testing/tests/test_appkit_settings.py \
              testing/tests/test_appkit_theme_preview.py \
              testing/tests/test_appkit_command_panel.py \
              testing/tests/test_appkit_menus.py \
              testing/tests/test_appkit_sequence_panel.py \
              testing/tests/test_appkit_ray_overlay.py \
              testing/tests/test_metal_pick.py \
              testing/tests/test_mouse_panel.py
